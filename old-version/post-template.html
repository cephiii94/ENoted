<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="description" id="metaDescription" content="" />
    <meta name="keywords" id="metaKeywords" content="" />
    <meta name="author" content="Cecep Hardiansyah" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" id="canonicalUrl" href="" />

    <meta property="og:title" id="ogTitle" content="" />
    <meta property="og:description" id="ogDescription" content="" />
    <meta property="og:image" id="ogImage" content="https://www.enoted.netifly.app/img/default-thumbnail.jpg" />
    <meta property="og:url" id="ogUrl" content="" />
    <meta property="og:type" content="article" />
    <meta property="og:site_name" content="ENoted" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" id="twitterTitle" content="" />
    <meta name="twitter:description" id="twitterDescription" content="" />
    <meta name="twitter:image" id="twitterImage" content="https://www.enoted.netifly.app/img/default-thumbnail.jpg" />

    <title id="pageTitle">ENoted</title>
    
    <!-- Google Fonts: Outfit & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="post-page">
    <!-- Floating Back Button -->
    <a href="/index.html" class="floating-back-btn" id="backButton" title="Kembali ke Beranda">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="content post-container" id="mainContent">
        <header class="post-header">
            <nav aria-label="breadcrumb" class="breadcrumb">
                <ol id="breadcrumbList">
                    <li><a href="/index.html">Beranda</a></li>
                    <li id="breadcrumbCategory" class="category"></li>
                    <li id="breadcrumbTitle" aria-current="page"></li>
                </ol>
            </nav>
            
            <h1 id="postTitle" class="gradient-text-post"></h1>
            
            <div class="post-meta-header">
                <span id="postDate" class="post-date-badge"></span>
                <button class="share-trigger-btn" id="shareButton">
                    <i class="fas fa-share-alt"></i> Bagikan
                </button>
            </div>
        </header>

        <div class="share-menu" id="shareMenu">
            <a href="#" onclick="shareViaWhatsApp()"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="#" onclick="shareViaFacebook()"><i class="fab fa-facebook-f"></i> Facebook</a>
            <a href="#" onclick="shareViaTelegram()"><i class="fab fa-telegram-plane"></i> Telegram</a>
            <a href="#" onclick="copyLink()"><i class="fas fa-link"></i> Salin Link</a>
        </div>
        
        <article class="article-body">
            <div class="post-content" id="postContent">
                <!-- Content injected here -->
            </div>
        </article>
    </div>

    <div class="popup-overlay" id="popupOverlay"></div>
    <div class="popup-notification" id="popupNotification">
        <p id="popupMessage"></p>
        <button class="close-popup" onclick="closePopup()">Tutup</button>
    </div>

    <script src="/js/script.js"></script>
    <script src="/js/popup-category.js"></script>

    <script type="application/ld+json" id="breadcrumbSchema">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": []
      }
    </script>
    <script type="application/ld+json" id="articleSchema">
      {
        "@context": "https://schema.org",
        "@type": "Article",
        "author": {
          "@type": "Person",
          "name": "Cecep Hardiansyah"
        },
        "publisher": {
          "@type": "Organization",
          "name": "ENoted",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.enoted.netifly.app/img/logo.png"
          }
        },
        "description": ""
      }
    </script>

    <script type="module" src="/js/post-page.js"></script>
    <script type="module" src="/js/firestore.js"></script>
    <script src="/js/bg-waktu.js"></script>

</body>
</html>
